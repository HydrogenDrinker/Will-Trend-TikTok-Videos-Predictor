version: '3.8'

# Tạo mạng riêng
networks:
  trending-videos-net:
    driver: bridge

x-airflow-common:
  &airflow-common
  build:
    context: ./
    dockerfile: base/Dockerfile
  # Tên Image riêng
  image: trending-videos:1.0
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    TZ: Asia/Ho_Chi_Minh
    AIRFLOW_CONN_SPARK_DEFAULT: "spark://spark-master:7077"
    # Thêm dòng này để Python trong Docker tự nhận diện thư mục projects
    PYTHONPATH: "/opt/airflow/projects/trending_predictor/scripts"
  volumes:
    - ${AIRFLOW_PROJ_DIR:-.}/dags:/opt/airflow/dags
    - ${AIRFLOW_PROJ_DIR:-.}/logs:/opt/airflow/logs
    # SỬA QUAN TRỌNG: Mount toàn bộ thư mục projects vào
    - ${AIRFLOW_PROJ_DIR:-.}/projects:/opt/airflow/projects
    - ${AIRFLOW_PROJ_DIR:-.}/models:/opt/airflow/models
    - ${AIRFLOW_PROJ_DIR:-.}/raw_data:/opt/airflow/projects/trending_predictor/raw_data
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    redis:
      condition: service_healthy
    postgres:
      condition: service_healthy
  networks:
    - trending-videos-net

services:
  # --- DATABASE ---
  postgres:
    image: postgres:13
    container_name: tv-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - tv-postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
    restart: always
    networks:
      - trending-videos-net

  mongo:
    image: mongo:6.0
    container_name: tv-mongo
    ports:
      - "27017:27017"
    volumes:
      - tv-mongo-db-volume:/data/db
    restart: always
    networks:
      - trending-videos-net

  redis:
    image: redis:7.0
    container_name: tv-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 50
    restart: always
    networks:
      - trending-videos-net

  # --- KAFKA & ZOOKEEPER ---
  zookeeper:
    image: zookeeper:3.8
    container_name: tv-zookeeper
    ports:
      - "2181:2181"
    restart: always
    networks:
      - trending-videos-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: tv-kafka
    ports:
      - "9094:9094"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    restart: always
    networks:
      - trending-videos-net

# --- SPARK CLUSTER ---
  spark-master:
    <<: *airflow-common
    container_name: tv-spark-master
    # THÊM DÒNG NÀY ĐỂ BỎ QUA AIRFLOW ENTRYPOINT
    entrypoint: /bin/bash
    command: >
      -c "/home/airflow/.local/bin/spark-class org.apache.spark.deploy.master.Master --ip 0.0.0.0 --port 7077 --webui-port 8080"
    ports:
      - "8081:8080"
      - "7077:7077"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      retries: 3

  spark-worker:
    <<: *airflow-common
    container_name: tv-spark-worker
    # THÊM DÒNG NÀY
    entrypoint: /bin/bash
    command: >
      -c "/home/airflow/.local/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077"
    environment:
      <<: *airflow-common-env
      SPARK_WORKER_CORES: 2
      SPARK_WORKER_MEMORY: 4G
    depends_on:
      - spark-master
    volumes:
      - ${AIRFLOW_PROJ_DIR:-.}/projects:/opt/airflow/projects
      - ${AIRFLOW_PROJ_DIR:-.}/models:/opt/airflow/models

  # --- AIRFLOW SERVICES ---
  airflow-webserver:
    <<: *airflow-common
    container_name: tv-airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      retries: 5
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: tv-airflow-scheduler
    command: scheduler
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-worker:
    <<: *airflow-common
    container_name: tv-airflow-worker
    command: celery worker
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    container_name: tv-airflow-triggerer
    command: triggerer
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    container_name: tv-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /sources/logs /sources/dags /sources/plugins /sources/projects /sources/models
        chown -R "${AIRFLOW_UID}:0" /sources/{logs,dags,plugins,projects,models}
        exec /entrypoint airflow version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
      # Thêm PATH để tránh lỗi command not found
      PATH: "/home/airflow/.local/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"
    user: "0:0"
    volumes:
      - ${AIRFLOW_PROJ_DIR:-.}:/sources

  # --- STREAMLIT ---
  streamlit:
    <<: *airflow-common
    container_name: tv-streamlit
    # SỬA QUAN TRỌNG: Đường dẫn file đúng theo cấu trúc TREE của bạn
    entrypoint: ["bash", "-c", "streamlit run /opt/airflow/projects/trending_predictor/streamlit/app.py --server.port 8501 --server.address 0.0.0.0"]
    ports:
      - "8501:8501"
    volumes:
      # Mount toàn bộ projects để code truy cập được scripts khác nếu cần
      - ${AIRFLOW_PROJ_DIR:-.}/projects:/opt/airflow/projects
      - ${AIRFLOW_PROJ_DIR:-.}/models:/opt/airflow/models
    depends_on:
      - mongo
      - kafka

volumes:
  tv-postgres-db-volume:
  tv-mongo-db-volume: